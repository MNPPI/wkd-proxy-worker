name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cloudflare-parity:
    name: Cloudflare Parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: pnpm

      - name: Tokenless Cloudflare install parity
        run: env -u NODE_AUTH_TOKEN pnpm install --frozen-lockfile

      - name: Check Cloudflare package
        env:
          WRANGLER_SEND_METRICS: 'false'
        run: pnpm cf:check

  quality:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Python quality tools
        run: |
          python3 -m venv "$RUNNER_TEMP/mnppi-python-quality"
          "$RUNNER_TEMP/mnppi-python-quality/bin/python" -m pip install "zizmor==1.26.1"
          echo "$RUNNER_TEMP/mnppi-python-quality/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: env -u NODE_AUTH_TOKEN -u NPM_TOKEN -u GITHUB_TOKEN pnpm install --frozen-lockfile

      - name: Local CI
        run: pnpm ci:local

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test with coverage
        run: pnpm run coverage

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [cloudflare-parity, quality, lint, test]
    environment: production
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Mask domain names
        run: |
          DOMAINS="${{ secrets.DOMAINS }}"
          for domain in ${DOMAINS//,/ }; do
            # This job runs only after merge or manual dispatch; forked PRs cannot reach this secret-backed step.
            echo "::add-mask::${domain}" # nosemgrep
          done

      - name: Build exact release artifact
        env:
          DOMAINS: ${{ secrets.DOMAINS }}
          WRANGLER_SEND_METRICS: 'false'
        run: |
          ROUTE_ARGS=()
          for domain in ${DOMAINS//,/ }; do
            ROUTE_ARGS+=(--route "openpgpkey.${domain}/*")
            ROUTE_ARGS+=(--route "${domain}/.well-known/openpgpkey/*")
            ROUTE_ARGS+=(--route "*.${domain}/.well-known/openpgpkey/*")
          done
          pnpm exec wrangler deploy --dry-run --outdir .wrangler/release \
            "${ROUTE_ARGS[@]}" --var "DOMAINS:${DOMAINS}"

      - name: Attest exact release artifact
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            .wrangler/release/index.js
            .wrangler/release/index.js.map

      - name: Verify release artifact provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh attestation verify .wrangler/release/index.js --repo "$GITHUB_REPOSITORY"
          gh attestation verify .wrangler/release/index.js.map --repo "$GITHUB_REPOSITORY"

      - name: Ensure DNS records
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          DOMAINS="${{ secrets.DOMAINS }}"
          API="https://api.cloudflare.com/client/v4"
          AUTH="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"

          for domain in ${DOMAINS//,/ }; do
            ZONE_ID=$(curl -sf -H "${AUTH}" \
              "${API}/zones?name=${domain}&status=active" | jq -r '.result[0].id')

            if [ "${ZONE_ID}" = "null" ] || [ -z "${ZONE_ID}" ]; then
              echo "::warning::Zone not found for ${domain}, skipping DNS records"
              continue
            fi

            # Ensure root domain has proxied records for .well-known route
            # (email-only domains may not have A/AAAA/CNAME for the root)
            ROOT_RECORDS=$(curl -sf -H "${AUTH}" \
              "${API}/zones/${ZONE_ID}/dns_records?name=${domain}&type=A" \
              | jq -r '.result | length')
            ROOT_AAAA=$(curl -sf -H "${AUTH}" \
              "${API}/zones/${ZONE_ID}/dns_records?name=${domain}&type=AAAA" \
              | jq -r '.result | length')
            ROOT_CNAME=$(curl -sf -H "${AUTH}" \
              "${API}/zones/${ZONE_ID}/dns_records?name=${domain}&type=CNAME" \
              | jq -r '.result | length')

            if [ "${ROOT_RECORDS}" = "0" ] && [ "${ROOT_AAAA}" = "0" ] && [ "${ROOT_CNAME}" = "0" ]; then
              echo "No proxied root record for ${domain}, creating placeholder records"
              curl -sf -X POST -H "${AUTH}" -H "Content-Type: application/json" \
                "${API}/zones/${ZONE_ID}/dns_records" \
                --data "{\"type\":\"A\",\"name\":\"${domain}\",\"content\":\"192.0.2.1\",\"proxied\":true}" \
                | jq '.success'
              curl -sf -X POST -H "${AUTH}" -H "Content-Type: application/json" \
                "${API}/zones/${ZONE_ID}/dns_records" \
                --data "{\"type\":\"AAAA\",\"name\":\"${domain}\",\"content\":\"100::\",\"proxied\":true}" \
                | jq '.success'
            else
              echo "Root domain ${domain} already has proxied records, skipping"
            fi

            # Ensure openpgpkey subdomain CNAME exists
            SUBDOMAIN_EXISTS=$(curl -sf -H "${AUTH}" \
              "${API}/zones/${ZONE_ID}/dns_records?name=openpgpkey.${domain}&type=CNAME" \
              | jq -r '.result | length')

            if [ "${SUBDOMAIN_EXISTS}" != "0" ]; then
              echo "DNS record openpgpkey.${domain} already exists, skipping"
            else
              echo "Creating DNS record openpgpkey.${domain}"
              curl -sf -X POST -H "${AUTH}" -H "Content-Type: application/json" \
                "${API}/zones/${ZONE_ID}/dns_records" \
                --data "{\"type\":\"CNAME\",\"name\":\"openpgpkey.${domain}\",\"content\":\"${domain}\",\"proxied\":true}" \
                | jq '.success'
            fi
          done

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: 'false'
        run: |
          DOMAINS="${{ secrets.DOMAINS }}"
          ROUTE_ARGS=()
          for domain in ${DOMAINS//,/ }; do
            ROUTE_ARGS+=(--route "openpgpkey.${domain}/*")
            ROUTE_ARGS+=(--route "${domain}/.well-known/openpgpkey/*")
            ROUTE_ARGS+=(--route "*.${domain}/.well-known/openpgpkey/*")
          done
          pnpm exec wrangler deploy .wrangler/release/index.js --no-bundle \
            --name wkd-proxy-worker "${ROUTE_ARGS[@]}" --var "DOMAINS:${DOMAINS}"
